[pytest]
testpaths = api_tests ui_tests
markers =
    auth: Authentication tests
    meals: Meal endpoint tests
    orders: Order endpoint tests
    payments: Payment endpoint tests
    reviews: Review endpoint tests
    coupons: Coupon endpoint tests
    delivery: Delivery endpoint tests
    stories: Story endpoint tests
    notifications: Notification endpoint tests
    security: Security tests
    ui: Selenium UI tests
    smoke: Quick smoke tests
    critical: Tests for critical issues from tracker
addopts = -v --tb=short --timeout=30
